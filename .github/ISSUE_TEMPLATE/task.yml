name: Task
description: Track repo maintenance, process, documentation, or infrastructure work.
title: "task: "
labels:
  - task
body:
  - type: textarea
    id: summary
    attributes:
      label: Task summary
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why is this task needed now?
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: Target files/areas
      description: List affected files, folders, processes, or GitHub settings.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this task to be complete?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Commands or manual checks expected before PR review.
      placeholder: |
        make doc-check
        make release-check
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: List docs to update, or explain why docs are not needed.
    validations:
      required: true
  - type: textarea
    id: agents
    attributes:
      label: Agent instructions
      description: Bound agent work to implementation, cleanup, validation, or review.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope guard
      description: List non-goals and forbidden changes for this task.
    validations:
      required: true
